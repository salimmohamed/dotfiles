# ══════════════════════════════════════════════════════════════════════════════
# TMUX CONFIGURATION
# Catppuccin Mocha | Session persistence | Popup features
# ══════════════════════════════════════════════════════════════════════════════

# ─── Environment ─────────────────────────────────────────────────────────────
set-environment -g PATH "/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin"
set-environment -g TMUX_PLUGIN_MANAGER_PATH "~/.config/tmux/plugins"

# ─── Core Settings ────────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"      # True color for Neovim
set -ga terminal-overrides '*:Ss=\E[%p1%d q:Se=\E[ q'  # Cursor shape passthrough
set -g escape-time 0                                  # No ESC delay (vim-critical)
set -g history-limit 50000                            # Large scrollback
set -g focus-events on                                # Pass focus events to vim
set -g mouse on                                       # Mouse support
set -g base-index 1                                   # Windows start at 1
setw -g pane-base-index 1                             # Panes start at 1
set -g renumber-windows on                            # Renumber on close
set -g set-clipboard on                               # OSC 52 clipboard
set -g display-time 2000                              # Message display time
set -g status-interval 5                              # Status refresh interval

# ─── Prefix Key (Ctrl+a) ──────────────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix                                  # Send Ctrl+a to nested apps

# Space opens which-key menu (after prefix)
bind Space run-shell "tmux show-wk-menu-root"

# ─── Quick Access (root table - no prefix needed) ────────────────────────────
# Alt+number for window switching (triggered by Cmd+number from Ghostty)
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# Alt+key for common actions (triggered by Cmd+key from Ghostty)
bind -n M-t new-window -c "#{pane_current_path}"
bind -n M-q kill-pane
bind -n M-d split-window -h -c "#{pane_current_path}"
bind -n M-D split-window -v -c "#{pane_current_path}"
bind -n M-z resize-pane -Z
bind -n M-g display-popup -E -w 90% -h 90% -d "#{pane_current_path}" "lazygit"
bind -n M-w choose-tree -Zs
bind -n M-W display-popup -E -w 60% -h 60% "tmux list-sessions -F '#{session_name}' | fzf --reverse --header 'Switch Session' | xargs tmux switch-client -t"

# ─── Pane Navigation (vim-style with prefix) ──────────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ─── Pane Management ──────────────────────────────────────────────────────────
bind s split-window -v -c "#{pane_current_path}"      # Horizontal split (below)
bind v split-window -h -c "#{pane_current_path}"      # Vertical split (right)
bind z resize-pane -Z                                  # Zoom toggle
bind q kill-pane                                       # Close pane

# Resize panes (repeatable with -r)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ─── Window Management ────────────────────────────────────────────────────────
bind t new-window -c "#{pane_current_path}"           # New window (Cmd+T via Ghostty)
bind [ previous-window
bind ] next-window
bind Tab last-window                                   # Toggle last window
bind r command-prompt -I "#W" "rename-window '%%'"

# Window selection (prefix + number) - triggered by Cmd+1-9 from Ghostty
bind 1 select-window -t 1
bind 2 select-window -t 2
bind 3 select-window -t 3
bind 4 select-window -t 4
bind 5 select-window -t 5
bind 6 select-window -t 6
bind 7 select-window -t 7
bind 8 select-window -t 8
bind 9 select-window -t 9

# ─── Session Management ───────────────────────────────────────────────────────
bind w choose-tree -Zs                                # Session/window chooser (visual)
bind W display-popup -E -w 60% -h 60% \
    "tmux list-sessions -F '#{session_name}' | fzf --reverse --header 'Switch Session' | xargs tmux switch-client -t"
bind N command-prompt -p "New session:" "new-session -s '%%'"
bind d detach-client

# ─── Modern Popup Features (tmux 3.2+) ────────────────────────────────────────
# Scratch terminal (persistent across sessions)
bind C-t display-popup -E -w 80% -h 80% -d "#{pane_current_path}" \
    "tmux new-session -A -s scratch"

# Floating lazygit
bind g display-popup -E -w 90% -h 90% -d "#{pane_current_path}" \
    "lazygit 2>/dev/null || echo 'lazygit not installed' && sleep 2"

# ─── Copy Mode (Vi-style) ─────────────────────────────────────────────────────
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Escape send -X cancel

# Maintain navigation in copy mode
bind -T copy-mode-vi C-h select-pane -L
bind -T copy-mode-vi C-j select-pane -D
bind -T copy-mode-vi C-k select-pane -U
bind -T copy-mode-vi C-l select-pane -R

# ─── Reload Config ────────────────────────────────────────────────────────────
bind R source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

# ─── Plugins (TPM) ────────────────────────────────────────────────────────────
# Install: prefix + I | Update: prefix + U | Clean: prefix + alt + u

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'          # Session persistence
set -g @plugin 'tmux-plugins/tmux-continuum'          # Auto-save sessions
set -g @plugin 'tmux-plugins/tmux-yank'               # Clipboard integration
set -g @plugin 'catppuccin/tmux#v2.1.3'               # Theme
set -g @plugin 'alexwforsythe/tmux-which-key'         # Which-key menu (Space)

# ─── Catppuccin Theme ─────────────────────────────────────────────────────────
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style "rounded"

# Status bar modules
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_session}"

# ─── Session Persistence ──────────────────────────────────────────────────────
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'
set -g @continuum-restore 'on'                        # Auto-restore on tmux start
set -g @continuum-save-interval '15'                  # Save every 15 minutes

# ─── Initialize TPM (must be at bottom) ───────────────────────────────────────
run '~/.config/tmux/plugins/tpm/tpm'
