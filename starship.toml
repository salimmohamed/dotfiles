# Starship Configuration
# https://starship.rs/config/

# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# Prompt format
format = """
[â”Œâ”€](bold green)$username$hostname$directory$git_branch$git_status$git_commit$git_metrics$git_state$fill$package$python$rust$golang$battery$jobs$cmd_duration$time
[â””â”€](bold green)$status$character"""

# Timeout for starship to execute commands
command_timeout = 1000

# Add a newline before the prompt
add_newline = true

[character]
success_symbol = "[â‌¯](bold green)"
error_symbol = "[â‌¯](bold red)"

[username]
show_always = false
format = "[$user]($style)@"
style_user = "bold cyan"

[hostname]
ssh_only = false
format = "[$hostname]($style) "
style = "bold blue"
aliases = { "Salims-MacBook-Pro" = "salim" }

[directory]
truncation_length = 3
truncate_to_repo = true
format = "in [$path]($style)[$read_only]($read_only_style) "
style = "bold yellow"
read_only = " ًں”’"

[git_branch]
symbol = " "
format = "on [$symbol$branch(:$remote_branch)]($style) "
style = "bold purple"

[git_status]
format = '([\[$all_status$ahead_behind\]]($style) )'
style = "bold red"
conflicted = "ًںڈ³"
ahead = "â‡،${count}"
behind = "â‡£${count}"
diverged = "â‡•â‡،${ahead_count}â‡£${behind_count}"
up_to_date = "âœ“"
untracked = "?"
stashed = "\\$"
modified = "!"
staged = "+"
renamed = "آ»"
deleted = "âœک"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bright-black"

# Language versions (shown when relevant)
[nodejs]
format = "via [$symbol($version )]($style)"
symbol = " "
style = "bold green"

[python]
format = 'via [${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'
symbol = " "
style = "bold yellow"

[rust]
format = "via [$symbol($version )]($style)"
symbol = " "
style = "bold red"

[golang]
format = "via [$symbol($version )]($style)"
symbol = " "
style = "bold cyan"

[cmd_duration]
min_time = 2000
format = "took [$duration]($style) "
style = "bold yellow"

[time]
disabled = false
format = '$time '
time_format = "%-I:%M %p"
style = "bold white"

# Disable unused modules for speed
[aws]
disabled = true

[docker_context]
disabled = true

[package]
disabled = false
symbol = "ًں“¦ "
format = "is [$symbol$version]($style) "
style = "208 bold"
display_private = false

[fill]
symbol = " "

[jobs]
symbol = "âœ¦"
number_threshold = 1
format = "[$symbol$number]($style) "
style = "bold blue"

[status]
disabled = false
symbol = "âœک"
format = '[\[$symbol $status\]]($style) '
style = "bold red"

[git_commit]
tag_symbol = " ًںڈ·  "
format = '[\($hash$tag\)]($style) '
style = "green bold"
only_detached = true

[git_metrics]
disabled = false
added_style = "bold green"
deleted_style = "bold red"
format = '[+$added]($added_style) [-$deleted]($deleted_style) '

[battery]
disabled = false
full_symbol = "ًں”‹"
charging_symbol = "âڑ،"
discharging_symbol = "ًں’€"

[[battery.display]]
threshold = 20
style = "bold red"

[[battery.display]]
threshold = 50
style = "bold yellow"

[[battery.display]]
threshold = 100
style = "bold green"
